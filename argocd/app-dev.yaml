apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tu-usuario/git-helm-k8-argcd.git'
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true