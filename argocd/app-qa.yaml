apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-service-qa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pablogonzalezr001/git-helm-k8-argcd.git'
    targetRevision: HEAD
    path: k8s/overlays/qa
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true