apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-local

helmCharts:
- name: ai-service
  includeCRDs: false
  repo: file://../../../helm/ai-service
  releaseName: ai-service
  namespace: ai-local
  valuesInline:
    image:
      repository: ai-service
      tag: local
      pullPolicy: IfNotPresent