apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai-prod

helmCharts:
- name: ai-service
  includeCRDs: false
  repo: file://../../../helm/ai-service
  releaseName: ai-service
  namespace: ai-prod
  valuesInline:
    replicaCount: 3
    image:
      tag: prod-latest
      pullPolicy: Always
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
