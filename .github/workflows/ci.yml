name: CI Pipeline

on:
  push:
    branches:
      - main
      - qa
      - staging
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: pablogonzalezr001/ai-service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para que el bot pueda hacer git push al manifest repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          cd app/ai-service
          chmod +x gradlew
          ./gradlew build

      - name: Prepare Image Tag
        id: prep
        run: |
          echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t $DOCKER_IMAGE:${{ env.TAG }} -f docker/Dockerfile .
          docker push $DOCKER_IMAGE:${{ env.TAG }}

      - name: Determine Environment
        id: env_vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            echo "DEPLOY_ENV=qa" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Update Manifests in Repository
        if: github.event_name == 'push'
        run: |
          cd k8s/overlays/${{ env.DEPLOY_ENV }}
          
          # Actualiza el tag de la imagen ejecutando el CLI de Kustomize
          kustomize edit set image $DOCKER_IMAGE=$DOCKER_IMAGE:${{ env.TAG }}
          
          # Realiza el commit y empuja de vuelta al repositorio
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add kustomization.yaml
          git commit -m "Update ${{ env.DEPLOY_ENV }} image tag to ${{ env.TAG }} [skip ci]"
          git push
